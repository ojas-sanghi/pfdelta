config_type: simple_batch
job_parameters:
  time: "48:00:00"
  p: "cpu-gpu-v100"
  gpus: 1
  body: "uv run __launch__"
batch_name: moe_suite_graph_moe_noisy_topk
dataset:
  datasets:
  - add_bus_type: false
    case_name: _connected_list(casename -- case14, case30, case57, case118, case500 | case14, case30, case57, case118, case500)
    model: PFNet
    name: pfdeltaPFNet
    root_dir: /mnt/home/donti-group-shared/pfdelta_data
    split: train
    task: 1.3
    transform: pfnet_data_mean0_var1
  - add_bus_type: false
    case_name: _connected_list(casename -- case14, case30, case57, case118, case500 | case14, case30, case57, case118, case500)
    model: PFNet
    name: pfdeltaPFNet
    root_dir: /mnt/home/donti-group-shared/pfdelta_data
    split: val
    task: 1.3
    transform: pfnet_data_mean0_var1
functional:
  config: graph_moe_noisy_topk
  cpu: false
  is_debug: false
  run_location: moe_suite/graph_moe_noisy_topk
  run_name: \%casename/seed=%seed_model=graph_moe_noisy_topk_lr=%lr
  seed: _manual_list(42, 43)
  trainer_name: gnn_trainer
model:
  name: graph_moe_noisy_topk
  in_dim: 6
  hidden_dim: 256
  out_dim: 6
  n_layers: 5
  n_experts: 4
  top_k: 2
  noisy_gating_std: _manual_list(0.05, 0.1, 0.2)
optim:
  optimizer:
    lr: _manual_list(0.0001, 0.0005, 0.001 | 1e-4, 5e-4, 1e-3)
    name: Adam
  train_params:
    batch_size: 64
    epochs: 80
    train_loss:
    - name: GNNTorchLoss
      output_name: bus__y
      torch_nn_name: MSELoss
    - name: pfn_masked_mse
      regularize: false
    - name: pfn_masked_mse
      regularize: true
    - model: PFNet
      name: universal_power_balance
  val_params:
    batch_size: 64
    report_every: 5
    early_stop:
      decrease_by: 0.01
      decrease_for: 10
      needs_best_every: 15
    val_loss:
    - name: pfn_masked_mse
      regularize: false
    - name: pfn_masked_mse
      regularize: true
    - name: GNNTorchLoss
      output_name: bus__y
      torch_nn_name: MSELoss
    - model: PFNet
      name: universal_power_balance
