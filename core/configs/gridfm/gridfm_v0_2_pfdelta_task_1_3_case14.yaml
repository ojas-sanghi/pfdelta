config_type: experiment

functional:
  config: gridfm/gridfm_v0_2_pfdelta_task_1_3_case14
  trainer_name: gnn_trainer
  cpu: true
  is_debug: true
  run_location: gridfm/
  run_name: gridfm_v0_2_pfdelta_task_1_3_case14
  seed: 0

dataset:
  root_dir: data
  case_name: case14
  task: 1.3
  model: GridFM
  name: pfdeltaGridFM
  pe_dim: 20
  mask_type: pf
  datasets:
    - split: train
    - split: val

model:
  name: gridfm_gps
  input_dim: 9
  hidden_dim: 256
  output_dim: 6
  edge_dim: 2
  pe_dim: 20
  num_layers: 8
  heads: 8
  dropout: 0.1
  mask_dim: 6
  mask_value: 0.0
  learn_mask: false

optim:
  optimizer:
    name: Adam
    lr: 0.0001
  train_params:
    epochs: 1
    batch_size: 8
    train_loss:
      - name: gridfm_masked_mse
      - name: GNNTorchLoss
        torch_nn_name: MSELoss
        output_name: y
  val_params:
    batch_size: 8
    report_every: 1
    val_loss:
      - name: gridfm_masked_mse
      - name: GNNTorchLoss
        torch_nn_name: MSELoss
        output_name: y
