# =============================================================================
# GridFM Fine-Tuning on PFDelta
# =============================================================================
# Loads the pre-trained GridFM v0.2 weights and fine-tunes on PFDelta data
# using a small learning rate and optional layer freezing.
#
# Usage:
#   python main.py --config examples/gridfm_finetune
#
# Staged fine-tuning strategy:
#   1. Phase 1: Freeze encoder + first 4 GPS layers, train decoder only.
#      Set freeze_encoder: true, freeze_gps_layers: 4, epochs: 50.
#   2. Phase 2: Unfreeze all layers, train end-to-end at lower lr.
#      Set freeze_encoder: false, freeze_gps_layers: 0, epochs: 100.
# =============================================================================

config_type: experiment

model:
  name: gridfm

  # ── GPSTransformer architecture ───────────────────────────────────────────
  input_dim:      9
  hidden_size:    256
  output_dim:     6
  edge_dim:       2
  pe_dim:         20
  num_layers:     8
  attention_head: 8
  dropout:        0.1
  mask_dim:       6
  mask_value:     0.0
  learn_mask:     false

  # ── Data normalisation ────────────────────────────────────────────────────
  baseMVA_orig:   100.0
  baseMVA_data:   0.0   # 0 = compute per-batch

  # ── Pre-trained weights ───────────────────────────────────────────────────
  pretrained_path: examples/models/GridFM_v0_2.pth

  # ── Masking ───────────────────────────────────────────────────────────────
  apply_pf_mask:  true

dataset:
  datasets:
    # ── Training set ─────────────────────────────────────────────────────
    - name: pfdeltadata
      case_name: case118
      root_dir: /mnt/home/donti-group-shared/pfdelta_data
      split: train
      task: 1.1
      model: GridFM

    # ── Validation set ────────────────────────────────────────────────────
    - name: pfdeltadata
      case_name: case118
      root_dir: /mnt/home/donti-group-shared/pfdelta_data
      split: val
      task: 1.1
      model: GridFM

functional:
  trainer_name: gridfm_trainer
  run_name: gridfm_finetune_case118_task1_1
  run_location: gridfm_finetune
  seed: 42
  is_debug: false
  cpu: false

  # ── Partial freezing (optional) ───────────────────────────────────────────
  # Set freeze_encoder: true to freeze the input encoder + pe norm layers.
  # Set freeze_gps_layers: N to freeze the first N GPS layers.
  # Both default to false/0 (all layers trainable).
  freeze_encoder:    false
  freeze_gps_layers: 0

optim:
  optimizer:
    name: Adam
    # Fine-tuning uses a lower learning rate than training from scratch
    lr: 0.00001

  lr_scheduler:
    name: ReduceLROnPlateau
    mode: min
    factor: 0.7
    patience: 10

  train_params:
    epochs: 100
    batch_size: 64
    train_loss:
      # Primary loss: masked MSE (feature reconstruction)
      - name: gridfm_masked_mse
      # Optional: power balance loss for physical consistency
      # Uncomment to include PBE in fine-tuning:
      # - name: gridfm_pbe

  val_params:
    batch_size: 64
    report_every: 5
    early_stop:
      decrease_by: 0.001
      decrease_for: 20
      needs_best_every: 30
    val_loss:
      - name: gridfm_masked_mse
      - name: gridfm_eval_rmse
