config_type: experiment

dataset:
  datasets:
    - name: pfdeltaGridFM
      model: GridFM
      root_dir: data/pfdelta_data
      case_name: case118
      split: train
      task: 1.3
    - name: pfdeltaGridFM
      model: GridFM
      root_dir: data/pfdelta_data
      case_name: case118
      split: val
      task: 1.3

functional:
  trainer_name: gnn_trainer
  run_name: gridfm_task_1_3_zeroshot
  run_location: gridfm
  seed: 11

model:
  name: gridfm_gps
  input_dim: 9
  hidden_dim: 256
  output_dim: 6
  edge_dim: 2
  pe_dim: 20
  num_layers: 8
  heads: 8
  dropout: 0.1
  mask_dim: 6
  mask_value: 0.0
  learn_mask: false
  checkpoint_path: artifacts/GridFM_v0_2.pth
  strict_checkpoint: false
  output_target: gridfm

optim:
  optimizer:
    name: Adam
    lr: 1.0e-4
  train_params:
    batch_size: 16
    epochs: 1
    train_loss:
      - name: GNNTorchLoss
        torch_nn_name: MSELoss
        output_name: bus__y_gridfm
  val_params:
    batch_size: 16
    report_every: 1
    val_loss:
      - name: GNNTorchLoss
        torch_nn_name: MSELoss
        output_name: bus__y_gridfm
