config_type: experiment
functional:
  trainer_name: gnn_trainer
  run_name: gridfm_finetune_task_1_3
  run_location: examples
  is_debug: true

model:
  name: gridfm_gps
  input_dim: 9
  hidden_size: 256
  output_dim: 6
  edge_dim: 2
  pe_dim: 20
  num_layers: 8
  attention_head: 8
  dropout: 0.1

dataset:
  root_dir: data
  datasets:
    - name: pfdelta_gridfm
      case_name: case57
      split: train
      task: 1.3
      model: gridfm
      mask_ratio: 0.5
    - name: pfdelta_gridfm
      case_name: case57
      split: val
      task: 1.3
      model: gridfm
      mask_ratio: 0.5

optim:
  optimizer:
    name: AdamW
    lr: 5.0e-5
    weight_decay: 1.0e-4
  train_params:
    epochs: 5
    batch_size: 32
    train_loss:
      - name: gridfm_masked_mse
  val_params:
    report_every: 1
    batch_size: 32
    val_loss:
      - name: gridfm_masked_mse
      - name: gridfm_mse
