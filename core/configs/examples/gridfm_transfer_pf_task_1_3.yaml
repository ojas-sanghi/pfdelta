config_type: experiment
dataset:
  datasets:
    - name: pfdeltaGridFM
      root_dir: data/pfdelta_data
      case_name: case118
      split: train
      task: 1.3
      model: GridFM
    - name: pfdeltaGridFM
      root_dir: data/pfdelta_data
      case_name: case118
      split: val
      task: 1.3
      model: GridFM
functional:
  trainer_name: gnn_trainer
  run_location: gridfm_transfer_pf
  run_name: gridfm_transfer_pf_task_1_3
  seed: 11
model:
  name: gridfm_transformer
  input_dim: 9
  pe_dim: 20
  edge_dim: 2
  hidden_dim: 256
  output_dim: 2
  num_layers: 8
  heads: 8
  dropout: 0.1
  pretrained_path: examples/models/GridFM_v0_2.pth
  pretrained_strict: false
optim:
  optimizer:
    name: Adam
    lr: 0.0003
  train_params:
    batch_size: 32
    epochs: 5
    train_loss:
      - MSELoss
  val_params:
    batch_size: 32
    report_every: 1
    val_loss:
      - MSELoss
